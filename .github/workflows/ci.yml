name: CI
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - name: Install modules
              run: npm install
            - name: Run linters
              run: npm run lint
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - name: Install modules
              run: npm install
            - name: Run Prettier
              run: npx prettier --check .
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - name: Install modules
              run: npm install
            - name: Run build
              run: npm run build
    unit-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
            - name: Install modules
              run: npm install
            - name: Run unit tests
              run: npm run coverage
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v7.0.0
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
